<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Pet API App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .toggle-btn.active-cat {
            background-color: #f59e0b; /* Amber 500 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.5);
        }

        .toggle-btn.active-dog {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #dog-image {
            max-height: 350px;
            object-fit: cover;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card rounded-2xl w-full max-w-lg overflow-hidden flex flex-col">
        
        <!-- Header -->
        <div class="p-6 text-center border-b border-gray-200">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
                <i class="fa-solid fa-paw text-amber-500 mr-2"></i>Pet Playground
            </h1>
            <p class="text-gray-500 text-sm">A dynamic site powered by public APIs</p>
        </div>

        <!-- Mode Toggle -->
        <div class="flex p-4 justify-center gap-4 bg-gray-50/50">
            <button id="cat-mode-btn" class="toggle-btn active-cat px-6 py-2 rounded-full font-semibold transition-all duration-300 flex items-center gap-2 text-gray-600 bg-white border border-gray-200 shadow-sm hover:bg-gray-50">
                <i class="fa-solid fa-cat"></i> Cat Facts
            </button>
            <button id="dog-mode-btn" class="toggle-btn px-6 py-2 rounded-full font-semibold transition-all duration-300 flex items-center gap-2 text-gray-600 bg-white border border-gray-200 shadow-sm hover:bg-gray-50">
                <i class="fa-solid fa-dog"></i> Dog Pics
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="p-8 flex-grow flex flex-col items-center justify-center min-h-[400px] relative">
            
            <!-- Loading Indicator -->
            <div id="loader" class="absolute inset-0 flex items-center justify-center bg-white/50 z-10 hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-gray-400"></i>
            </div>

            <!-- Content Container -->
            <div id="content-container" class="w-full text-center flex flex-col items-center justify-center">
                <!-- Initial State -->
                <div class="text-gray-400 mb-4">
                    <i class="fa-solid fa-wand-magic-sparkles text-5xl mb-3"></i>
                    <p>Click the button below to fetch!</p>
                </div>
            </div>

        </div>

        <!-- Action Area -->
        <div class="p-6 border-t border-gray-200 flex justify-center bg-white/30">
            <button id="fetch-btn" class="bg-gray-800 hover:bg-gray-900 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform transform hover:scale-105 active:scale-95 flex items-center gap-2">
                <i class="fa-solid fa-bolt"></i> <span id="btn-text">Get a Cat Fact!</span>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let currentMode = 'cat'; // 'cat' or 'dog'

            // DOM Elements
            const catModeBtn = document.getElementById('cat-mode-btn');
            const dogModeBtn = document.getElementById('dog-mode-btn');
            const fetchBtn = document.getElementById('fetch-btn');
            const btnText = document.getElementById('btn-text');
            const contentContainer = document.getElementById('content-container');
            const loader = document.getElementById('loader');

            // API Endpoints
            const CAT_API_URL = 'https://catfact.ninja/fact';
            const DOG_API_URL = 'https://dog.ceo/api/breeds/image/random';

            function switchMode(mode) {
                currentMode = mode;
                
                // Update Button Styles
                if (mode === 'cat') {
                    catModeBtn.classList.add('active-cat');
                    catModeBtn.classList.remove('text-gray-600', 'bg-white');
                    
                    dogModeBtn.classList.remove('active-dog');
                    dogModeBtn.classList.add('text-gray-600', 'bg-white');
                    
                    fetchBtn.className = 'bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform transform hover:scale-105 active:scale-95 flex items-center gap-2';
                    btnText.textContent = 'Get a Cat Fact!';
                } else {
                    dogModeBtn.classList.add('active-dog');
                    dogModeBtn.classList.remove('text-gray-600', 'bg-white');
                    
                    catModeBtn.classList.remove('active-cat');
                    catModeBtn.classList.add('text-gray-600', 'bg-white');
                    
                    fetchBtn.className = 'bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-transform transform hover:scale-105 active:scale-95 flex items-center gap-2';
                    btnText.textContent = 'Get a Dog Pic!';
                }

                // Clear content when switching modes
                contentContainer.innerHTML = `
                    <div class="text-gray-400 mb-4 fade-in">
                        <i class="fa-solid fa-wand-magic-sparkles text-5xl mb-3"></i>
                        <p>Ready to fetch ${mode === 'cat' ? 'facts' : 'pics'}!</p>
                    </div>
                `;
            }

            async function fetchData() {
                // Show Loader
                loader.classList.remove('hidden');
                fetchBtn.disabled = true;

                try {
                    if (currentMode === 'cat') {
                        const response = await fetch(CAT_API_URL);
                        const data = await response.json();
                        
                        contentContainer.innerHTML = `
                            <div class="fade-in w-full">
                                <i class="fa-solid fa-quote-left text-3xl text-amber-200 mb-4 block"></i>
                                <p class="text-xl text-gray-700 font-medium leading-relaxed italic">"${data.fact}"</p>
                                <i class="fa-solid fa-quote-right text-3xl text-amber-200 mt-4 block text-right"></i>
                            </div>
                        `;
                    } else {
                        const response = await fetch(DOG_API_URL);
                        const data = await response.json();
                        
                        // Extract breed name from URL for fun
                        // URL format: https://images.dog.ceo/breeds/hound-english/n02089973_1.jpg
                        const parts = data.message.split('/');
                        let breed = 'Unknown Breed';
                        if(parts.length > 4) {
                            breed = parts[4].replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase());
                        }

                        contentContainer.innerHTML = `
                            <div class="fade-in w-full flex flex-col items-center">
                                <div class="rounded-xl overflow-hidden shadow-md border-4 border-white mb-3 w-full">
                                    <img src="${data.message}" alt="A random dog" id="dog-image" class="w-full h-auto" onerror="this.onerror=null; this.src='https://placehold.co/400x300/e2e8f0/64748b?text=Dog+Pic+Not+Found'">
                                </div>
                                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full border border-blue-200">
                                    ${breed}
                                </span>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    contentContainer.innerHTML = `
                        <div class="fade-in text-red-500">
                            <i class="fa-solid fa-circle-exclamation text-4xl mb-2"></i>
                            <p>Oops! Something went wrong fetching the data.</p>
                        </div>
                    `;
                } finally {
                    // Hide Loader
                    loader.classList.add('hidden');
                    fetchBtn.disabled = false;
                }
            }

            catModeBtn.addEventListener('click', () => switchMode('cat'));
            dogModeBtn.addEventListener('click', () => switchMode('dog'));
            fetchBtn.addEventListener('click', fetchData);
            
            // Initialize
            switchMode('cat');
        });
    </script>
</body>
</html>
